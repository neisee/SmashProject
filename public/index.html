<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Primera SPA Modulada</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; transition: background 0.3s; }
        .header { background-color: #333; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .header h2 { margin: 0; cursor: pointer; }
        .contenedor { max-width: 600px; margin: 40px auto; padding: 20px; }
        ul { padding: 0; list-style: none; }
        li { background: #f4f4f4; margin: 10px 0; padding: 15px; border-radius: 5px; border-left: 5px solid #007bff; cursor: pointer; transition: background 0.2s; }
        li:hover { background: #e9e9e9; }
        .vista-verde { font-size: 48px; text-align: center; margin-top: 50px; }
    </style>
</head>
<body>

    <div class="header">
        <h2 id="logo-home">SmashProject 🚀</h2>
        <span>Mi Cuenta</span>
    </div>

    <div id="vista-principal" class="contenedor"></div>

    <script type="module" src="/js/app-frontend.js"></script>
</body>
</html>
