<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmashProject SPA</title>
    <link rel="stylesheet" href="/css/estilos.css">
</head>
<body>

    <div class="header">
        <h2 id="logo-home">
            <img src="/images/logo.png" alt="Logo SmashProject" class="logo-icono">
            SmashProject
        </h2>
        <div class="header-center">
            <button id="btn-login" class="btn-nav">Login</button>
            <button id="btn-register" class="btn-nav">Register</button>
        </div>
        <div class="header-right">
            <button id="btn-edit-profile" class="btn-nav btn-profile oculto">Invitado</button>
            <button id="btn-logout" class="btn-nav btn-danger">Log Out</button>
        </div>
    </div>

    <div id="vista-principal" class="contenedor"></div>

    <script type="module" src="/js/router.js"></script>
    <div id="custom-confirm-modal" class="modal-overlay oculto">
        <div class="modal-content auth-container">
            <h3 id="confirm-modal-title">Confirm Action</h3>
            <p id="confirm-modal-message">Are you sure you want to proceed?</p>
            
            <div class="modal-actions">
                <button id="confirm-modal-cancel" class="btn-nav">Cancel</button>
                <button id="confirm-modal-accept" class="btn-nav btn-danger">Confirm</button>
            </div>
        </div>
    </div>
</body>
</html>
